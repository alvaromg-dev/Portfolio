<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:lang="${usersLang}">
<head th:replace="~{components/layout/head :: pageHead(pageTitle=${pageTitle})}"></head>
<body th:attr="data-delete-confirm=${usersDeleteConfirm}">
<main class="users-main">
  <div class="users-header">
    <h1 class="cv-section-h2" th:text="${usersTitle}">Gestion de usuarios</h1>
    <div class="users-header-actions">
      <a class="users-back-link" th:href="@{/(lang=${usersLang})}" th:text="${usersBackLabel}">Volver al portfolio</a>
      <form method="post" th:action="@{/logout}" class="users-logout-form">
        <button class="users-logout-button" type="submit" th:text="${usersLogoutLabel}">Salir</button>
      </form>
    </div>
  </div>

  <p th:if="${usersSuccess}" class="users-message users-ok" th:text="${usersSuccess}">Usuario creado</p>
  <p th:if="${usersError}" class="users-message users-error" th:text="${usersError}">Error</p>

  <section class="users-create-card">
    <h2 th:text="${usersCreateTitle}">Crear usuario</h2>
    <form class="users-create-form" method="post" th:action="@{/users/create}">
      <input type="hidden" name="lang" th:value="${usersLang}" />
      <label class="editor-field">
        <span th:text="${usersUsernameLabel}">Usuario</span>
        <input type="text" name="username" required />
      </label>
      <label class="editor-field">
        <span th:text="${usersGivenNamesLabel}">Nombre</span>
        <input type="text" name="givenNames" required />
      </label>
      <label class="editor-field">
        <span th:text="${usersFamilyNamesLabel}">Apellidos</span>
        <input type="text" name="familyNames" />
      </label>
      <label class="editor-field">
        <span th:text="${usersPasswordLabel}">Contrasena</span>
        <input type="password" name="password" minlength="6" required />
      </label>
      <button class="users-create-submit" type="submit" th:text="${usersCreateButtonLabel}">Crear</button>
    </form>
  </section>

  <div class="users-table-wrapper">
    <table class="users-table">
      <thead>
      <tr>
        <th th:text="${usersUsernameLabel}">Usuario</th>
        <th th:text="${usersGivenNamesLabel}">Nombre</th>
        <th th:text="${usersFamilyNamesLabel}">Apellidos</th>
        <th th:text="${usersPasswordLabel}">Contrasena</th>
        <th th:text="${usersRolesLabel}">Roles</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr th:if="${usersRows == null or usersRows.isEmpty()}">
        <td colspan="6">No users</td>
      </tr>
      <tr th:each="row : ${usersRows}">
        <td colspan="6">
          <form class="users-row-form" method="post" th:action="@{/users/update}">
            <input type="hidden" name="lang" th:value="${usersLang}" />
            <input type="hidden" name="id" th:value="${row.id}" />
            <input type="text" name="username" th:value="${row.username}" th:readonly="${row.admin}" required />
            <input type="text" name="givenNames" th:value="${row.givenNames}" required />
            <input type="text" name="familyNames" th:value="${row.familyNames}" />
            <input type="password" name="password" minlength="6" th:attr="placeholder=${usersPasswordHint}" />
            <span class="users-roles-cell" th:text="${#strings.listJoin(row.roles, ', ')}">CV_EDITOR</span>
            <div class="users-row-actions">
              <button type="submit" th:text="${usersUpdateButtonLabel}">Actualizar</button>
              <button type="submit"
                      th:if="${!row.admin}"
                      class="users-delete-btn"
                      th:formaction="@{/users/delete}"
                      th:text="${usersDeleteButtonLabel}">Eliminar</button>
            </div>
          </form>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</main>
<script src="/users.js" defer></script>
</body>
</html>

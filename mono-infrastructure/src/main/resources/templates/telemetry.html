<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:lang="${telemetryLang}">
<head th:replace="~{components/layout/head :: pageHead(pageTitle=${pageTitle})}"></head>
<body th:attr="data-delete-confirm=${telemetryDeleteConfirm}">
<main class="telemetry-main">
  <div class="telemetry-header">
    <h1 class="cv-section-h2" th:text="${telemetryTitle}">Telemetria de visitas</h1>
    <div class="telemetry-header-actions">
      <a th:if="${canManageUsers}" class="telemetry-back-link" th:href="@{/users(lang=${telemetryLang})}" th:text="${usersButtonLabel}">Usuarios</a>
      <a class="telemetry-back-link" th:href="@{/(lang=${telemetryLang})}" th:text="${telemetryBackLabel}">Volver al portfolio</a>
      <form method="post" th:action="@{/logout}" class="telemetry-logout-form">
        <button class="telemetry-logout-button" type="submit" th:text="${logoutButtonLabel}">Salir</button>
      </form>
    </div>
  </div>

  <div class="telemetry-stats">
    <article class="telemetry-stat-card">
      <h3 th:text="${telemetryStatsDayLabel}">Hoy</h3>
      <p th:text="${telemetryStats.dayVisits}">0</p>
    </article>
    <article class="telemetry-stat-card">
      <h3 th:text="${telemetryStatsWeekLabel}">Esta semana</h3>
      <p th:text="${telemetryStats.weekVisits}">0</p>
    </article>
    <article class="telemetry-stat-card">
      <h3 th:text="${telemetryStatsMonthLabel}">Este mes</h3>
      <p th:text="${telemetryStats.monthVisits}">0</p>
    </article>
    <article class="telemetry-stat-card">
      <h3 th:text="${telemetryStatsYearLabel}">Este año</h3>
      <p th:text="${telemetryStats.yearVisits}">0</p>
    </article>
  </div>

  <div class="telemetry-table-wrapper">
    <table class="telemetry-table">
      <thead>
      <tr>
        <th th:text="${telemetryDeviceNameLabel}">Dispositivo (nombre/modelo)</th>
        <th th:text="${telemetryFromLabel}">Desde donde</th>
        <th th:text="${telemetryBrowserLabel}">Navegador</th>
        <th th:text="${telemetryDeviceLabel}">Tipo de dispositivo</th>
        <th th:text="${telemetryTimeLabel}">Hora</th>
        <th th:text="${telemetryActionsLabel}">Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr th:if="${telemetryRows == null or telemetryRows.isEmpty()}">
        <td colspan="6">No data</td>
      </tr>
      <tr th:each="row : ${telemetryRows}">
        <td th:text="${row.deviceName}">iPhone</td>
        <td th:text="${row.fromWhere}">127.0.0.1</td>
        <td th:text="${row.browser}">Chrome</td>
        <td th:text="${row.device}">Desktop</td>
        <td th:text="${row.visitedAt}">2026-04-14 22:00:00</td>
        <td>
          <button class="telemetry-delete-btn" type="button" th:attr="data-id=${row.id}" th:text="${telemetryDeleteLabel}">Eliminar</button>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</main>
<script src="/telemetry.js" defer></script>
</body>
</html>

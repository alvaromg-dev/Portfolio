<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="cv-section section-border" th:classappend="${cv.hasEducationData()} ? '' : ' section-empty'" th:fragment="education(cv)">
  <h2 class="cv-section-h2" th:text="${cv.educationTitle}">Educacion</h2>
  <div class="section-view">
    <ul class="stack-list" id="education-list-view">
      <li th:each="edu : ${cv.education}"
          th:attr="data-institution=${edu.institution},data-area=${edu.area},data-url=${edu.url},data-start-date=${edu.startDate},data-end-date=${edu.endDate},data-courses=${edu.courses != null ? #strings.listJoin(edu.courses,'||') : ''}">
        <th:block th:replace="~{components/shared/list-item :: item(title=${edu.institution}, title2=${edu.area}, description=${null}, url=${edu.url}, highlights=${edu.courses}, years=${cv.yearRange(edu.startDate, edu.endDate)})}"></th:block>
      </li>
    </ul>
  </div>
  <div class="section-editor" id="education-editor" th:attr="data-add-label=${cv.addButtonLabel}">
    <div class="editor-items"></div>
    <button class="editor-add" type="button">+</button>
  </div>
</section>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="cv-section section-border" th:classappend="${cv.hasSkillsData()} ? '' : ' section-empty'" th:fragment="skills(cv)">
  <h2 class="cv-section-h2" th:text="${cv.skillsTitle}">Habilidades</h2>
  <div class="section-view">
    <ul class="stack-list" id="skills-list-view">
      <li th:each="skillName : ${cv.skillNames}" th:attr="data-name=${skillName}">
        <th:block th:replace="~{components/shared/list-item :: item(title=${skillName}, title2=${null}, description=${null}, url=${null}, highlights=${null}, years=${null})}"></th:block>
      </li>
    </ul>
  </div>
  <div class="section-editor" id="skills-editor" th:attr="data-add-label=${cv.addButtonLabel}">
    <div class="editor-items"></div>
    <button class="editor-add" type="button">+</button>
  </div>
</section>
</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="cv-section section-border" th:classappend="${cv.hasExperienceData()} ? '' : ' section-empty'" th:fragment="experience(cv)">
  <h2 class="cv-section-h2" th:text="${cv.experienceTitle}">Experiencia laboral</h2>
  <div class="section-view">
    <ul class="stack-list" id="work-list-view">
      <li th:each="job : ${cv.work}"
          th:attr="data-name=${job.name},data-position=${job.position},data-url=${job.url},data-start-date=${job.startDate},data-end-date=${job.endDate},data-summary=${job.summary},data-highlights=${job.highlights != null ? #strings.listJoin(job.highlights,'||') : ''}">
        <th:block th:replace="~{components/shared/list-item :: item(title=${job.name}, title2=${job.position}, description=${job.summary}, url=${job.url}, highlights=${job.highlights}, years=${cv.yearRange(job.startDate, job.endDate)})}"></th:block>
      </li>
    </ul>
  </div>
  <div class="section-editor" id="work-editor" th:attr="data-add-label=${cv.addButtonLabel}">
    <div class="editor-items"></div>
    <button class="editor-add" type="button">+</button>
  </div>
</section>
</body>
</html>
